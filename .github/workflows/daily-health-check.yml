name: Daily SGF Health Check

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Reminder
        run: |
          echo "Lembrete diario SGF: executando checagem automatica de saude."
          echo "Para rodar manualmente no projeto: pnpm health:daily"

      - name: Run daily health check
        run: pnpm health:daily
