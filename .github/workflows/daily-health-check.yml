name: Daily SGF Health Check

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Reminder
        run: |
          echo "Lembrete diario SGF: executando checagem automatica de saude."
          echo "Para rodar manualmente no projeto: pnpm health:daily"

      - name: Run daily health check
        env:
          SMOKE_USER: ${{ secrets.SMOKE_USER }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: |
          if [ -z "${SMOKE_USER}" ] || [ -z "${SMOKE_PASSWORD}" ]; then
            echo "SMOKE_USER/SMOKE_PASSWORD não configurados. Executando healthz básico."
            STATUS_CODE=$(curl -L -s -o /tmp/daily-healthz-body.txt -w "%{http_code}" "https://sgf-online.onrender.com/healthz")
            echo "healthz status: ${STATUS_CODE}"
            if [ "${STATUS_CODE}" -lt 200 ] || [ "${STATUS_CODE}" -ge 400 ]; then
              cat /tmp/daily-healthz-body.txt >&2 || true
              exit 1
            fi
            exit 0
          fi

          pnpm health:daily
